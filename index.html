<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster | Minimal To-Do</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .task-done { text-decoration: line-through; opacity: 0.5; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-card rounded-[2.5rem] p-8 shadow-2xl">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-800 tracking-tight text-white">Daily <span class="text-cyan-400">Tasks</span></h1>
            <p class="text-slate-400 text-sm mt-2">Stay organized, stay productive.</p>
        </header>

        <div class="relative mb-8">
            <input type="text" id="todoInput" 
                class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl py-4 px-6 outline-none focus:border-cyan-400 transition-all text-white placeholder:text-slate-500"
                placeholder="What needs to be done?">
            <button onclick="addTodo()" 
                class="absolute right-2 top-2 bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-bold py-2 px-4 rounded-xl transition-all shadow-lg shadow-cyan-500/20">
                Add
            </button>
        </div>

        <div class="flex gap-2 mb-6 p-1 bg-slate-900/50 rounded-xl">
            <button class="flex-1 py-2 text-xs font-bold rounded-lg bg-slate-800 text-cyan-400 shadow-sm">All</button>
            <button class="flex-1 py-2 text-xs font-bold rounded-lg text-slate-500 hover:text-slate-300">Pending</button>
            <button class="flex-1 py-2 text-xs font-bold rounded-lg text-slate-500 hover:text-slate-300">Completed</button>
        </div>

        <ul id="todoList" class="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
            </ul>

        <div class="mt-8 pt-6 border-t border-slate-800 flex justify-between items-center text-xs text-slate-500 font-bold uppercase tracking-wider">
            <span id="itemsCount">0 items left</span>
            <button class="hover:text-red-400 transition-colors">Clear Completed</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
