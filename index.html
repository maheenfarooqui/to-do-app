<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskMaster | Bootstrap Edition</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="todo-card">
            <div class="text-center mb-4">
              <h2 class="fw-bold">
                Daily <span style="color: #22d3ee">Tasks</span>
              </h2>
              <p class="text-secondary small">
                Stay organized, stay productive.
              </p>
            </div>

            <div class="input-group mb-4">
              <input
                type="text"
                id="todoInput"
                class="form-control"
                placeholder="What needs to be done?"
              />
              <button class="btn btn-cyan px-4" onclick="addTodo()" id="addBtn">
                Add
              </button>
            </div>

            <div class="btn-group w-100 mb-4" role="group">
              <input
                type="radio"
                class="btn-check"
                name="filter"
                id="allTask"
                checked
              />
              <label
                class="btn btn-outline-secondary btn-sm"
                for="allTask"
                
                >All</label
              >

              <input
                type="radio"
                class="btn-check"
                name="filter"
                id="pending"
              />
              <label
                class="btn btn-outline-secondary btn-sm"
                for="pending"
                
                >Pending</label
              >

              <input
                type="radio"
                class="btn-check"
                name="filter"
                id="completed"
              />
              <label
                class="btn btn-outline-secondary btn-sm"
                for="completed"
                
                >Completed</label
              >
            </div>

            <div id="todoList"></div>

            <div
              class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top border-secondary small text-secondary"
            >
              <span id="itemsCount">0 items left</span>
              <span
                style="cursor: pointer"
                class="hover-red"
                onclick="clearAll()"
                >Clear All</span
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
  </body>
</html>
