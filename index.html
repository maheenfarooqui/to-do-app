<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskMaster | Bootstrap Edition</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />

    <style>
      body {
        background-color: #0f172a;
        color: #f8fafc;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
      }
      .action-icons i {
        transition: 0.2s;
      }
      .edit-btn:hover {
        color: #22d3ee !important;
      }
      .delete-btn:hover {
        color: #f87171 !important;
      }
      .task-icon:hover i {
        transform: scale(1.2);
        transition: 0.2s;
      }
      .todo-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 25px;
        padding: 30px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }
      .input-group-text {
        background-color: #1e293b;
        border-color: #334155;
        color: #22d3ee;
      }
      .form-control {
        background-color: #1e293b;
        border-color: #334155;
        color: white;
      }
      .form-control:focus {
        background-color: #1e293b;
        border-color: #22d3ee;
        color: white;
        box-shadow: none;
      }
      .btn-cyan {
        background-color: #22d3ee;
        color: #0f172a;
        font-weight: bold;
      }
      .btn-cyan:hover {
        background-color: #06b6d4;
      }
      .todo-item {
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid #334155;
        border-radius: 15px;
        margin-bottom: 12px;
        padding: 15px;
        transition: 0.3s;
      }
      .todo-item:hover {
        border-color: #22d3ee;
      }
      .task-done {
        text-decoration: line-through;
        opacity: 0.5;
      }
      .delete-btn:hover {
        color: #ef4444;
      }
      .edit-btn:hover {
        color: #22d3ee;
      }

      /* Custom Scrollbar */
      #todoList {
        max-height: 350px;
        overflow-y: auto;
        padding-right: 5px;
      }
      #todoList::-webkit-scrollbar {
        width: 5px;
      }
      #todoList::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="todo-card">
            <div class="text-center mb-4">
              <h2 class="fw-bold">
                Daily <span style="color: #22d3ee">Tasks</span>
              </h2>
              <p class="text-secondary small">
                Stay organized, stay productive.
              </p>
            </div>

            <div class="input-group mb-4">
              <input
                type="text"
                id="todoInput"
                class="form-control"
                placeholder="What needs to be done?"
              />
              <button class="btn btn-cyan px-4" onclick="addTodo()" id="addBtn">
                Add
              </button>
            </div>

            <div class="btn-group w-100 mb-4" role="group">
              <input
                type="radio"
                class="btn-check"
                name="filter"
                id="all"
                checked
              />
              <label class="btn btn-outline-secondary btn-sm" for="all"
                >All</label
              >

              <input
                type="radio"
                class="btn-check"
                name="filter"
                id="pending"
              />
              <label class="btn btn-outline-secondary btn-sm" for="pending"
                >Pending</label
              >

              <input
                type="radio"
                class="btn-check"
                name="filter"
                id="completed"
              />
              <label class="btn btn-outline-secondary btn-sm" for="completed"
                >Completed</label
              >
            </div>

            <div id="todoList">
             
            </div>

            <div
              class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top border-secondary small text-secondary"
            >
              <span id="itemsCount">0 items left</span>
              <span
                style="cursor: pointer"
                class="hover-red"
                onclick="clearAll()"
                >Clear All</span
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
  </body>
</html>
